<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自然分類道館：探險員屬性覺醒測驗</title>
    <style>
        body {
            background-color: #121212;
            color: #E0E0E0;
            font-family: '微軟正黑體', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #app-container {
            background: #1E1E1E;
            width: 90%;
            max-width: 600px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.3);
            text-align: center;
            border: 1px solid #333;
        }
        h1, h2 { color: #4CAF50; }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #333;
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        #progress-fill {
            height: 100%;
            width: 0%;
            background: #4CAF50;
            transition: width 0.3s ease;
        }
        .question-text {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 30px;
            min-height: 80px;
        }
        .btn {
            background: #2E2E2E;
            color: #FFF;
            border: 2px solid #4CAF50;
            padding: 15px 20px;
            width: 100%;
            margin: 10px 0;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background: #4CAF50;
            color: #121212;
            box-shadow: 0 0 15px #4CAF50;
        }
        .hidden { display: none; }
        #result-img-placeholder {
            width: 100%;
            height: 250px;
            background: #333;
            border: 2px dashed #4CAF50;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            color: #888;
        }
        #result-img {
            max-width: 100%;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none; 
        }
        .role-title { font-size: 2rem; color: #FFC107; margin-bottom: 10px;}
        .role-desc { font-size: 1.1rem; line-height: 1.5; color: #CCC;}
	/* --- 修復平板畫面裁切與滑動問題 --- */
        body, html {
            min-height: 100vh;
            overflow-y: auto;
        }

        #result-container, .container {
            max-height: none !important; 
            overflow: visible !important;
            padding-bottom: 50px;
        }

        #result-img {
            max-width: 100%; 
            height: auto; 
            display: block;
            margin: 20px auto;
        }
    </style>
</head>
<body>

<div id="app-container">
    <div id="start-screen">
        <h1>🌲 探險員屬性覺醒</h1>
        <p>這是一場為期 10 天的極限生態探險。<br>每一次的二選一，都在暴露你大腦的真實運作模式。<br>準備好揭曉你的隱藏屬性了嗎？</p>
        <button class="btn" onclick="startGame()">登錄道館，啟動測驗</button>
    </div>

    <div id="question-screen" class="hidden">
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <h2 id="q-number">Day 1</h2>
        <div class="question-text" id="q-text">題目載入中...</div>
        <button class="btn" id="btn-a" onclick="answer('A')"></button>
        <button class="btn" id="btn-b" onclick="answer('B')"></button>
    </div>

    <div id="result-screen" class="hidden">
        <h2>分析完成！你的專屬屬性是...</h2>
        
        <div id="result-img-placeholder">（老師的手繪圖卡預留區）</div>
        <img id="result-img" src="" alt="專屬角色圖卡">

        <div class="role-title" id="r-title">角色名稱</div>
        <div class="role-desc" id="r-desc">角色描述</div>
        <button class="btn" onclick="location.reload()" style="margin-top:20px; border-color:#FF9800; color:#FF9800;">重新測試 (測試用)</button>
    </div>
</div>

<script>
    // 玩家分數板
    let scores = {
        commentator: 0,
        director: 0,
        illustrator: 0,
        investigator: 0,
        editor: 0
    };

    let currentQuestionIndex = 0;

    // 10 題情境題庫
    const questions = [
        {
            day: "Day 1：未知發現",
            text: "在森林邊緣，你發現了一株發出幽微藍光的奇特植物。你的第一反應是？",
            a: { text: "立刻拿出素描本，畫下它葉片的獨特紋理。", role: "illustrator" },
            b: { text: "拿出隨身儀器，測量它周圍土壤的溫濕度與酸鹼值。", role: "investigator" }
        },
        {
            day: "Day 2：突發狀況",
            text: "樹叢後突然傳出巨大的沙沙聲，似乎有大型動物靠近！你會？",
            a: { text: "打手勢指揮隊友：「大家安靜，散開尋找掩護物！」", role: "director" },
            b: { text: "模仿樹葉摩擦的聲音，試圖跟未知的生物打招呼。", role: "commentator" }
        },
        {
            day: "Day 3：營地建設",
            text: "傍晚抵達紮營點，大家開始放下裝備。你會主動負責什麼？",
            a: { text: "拿出筆記本，把今天一整天的探險經歷寫成精彩的日誌。", role: "editor" },
            b: { text: "觀察地形，畫出營地防禦與帳篷配置的平面圖。", role: "illustrator" }
        },
        {
            day: "Day 4：氣候危機",
            text: "天氣驟變，一場暴雨即將來襲。為了保護採集到的標本，你會？",
            a: { text: "迅速分配任務，帶領大家挖排水溝、加固帳篷！", role: "director" },
            b: { text: "抬頭觀察雲層移動速度，精準計算暴雨還有幾分鐘抵達。", role: "investigator" }
        },
        {
            day: "Day 5：部落交流",
            text: "你們遇到了一個隱居在森林深處的神秘部落。你會如何與他們接觸？",
            a: { text: "帶著最燦爛的笑容走上前，用豐富的肢體語言跟他們交朋友！", role: "commentator" },
            b: { text: "躲在後方，安靜且詳細地記錄他們的穿著與特殊語言。", role: "editor" }
        },
        {
            day: "Day 6：古代遺跡",
            text: "在一個洞穴裡，你們發現了一扇刻滿圖騰的石門。你會怎麼做？",
            a: { text: "檢查石門的物理結構，尋找有沒有隱藏的機關或鑰匙孔。", role: "investigator" },
            b: { text: "拿出碳筆和紙，把石門上的古老圖騰完美拓印下來。", role: "illustrator" }
        },
        {
            day: "Day 7：寶物分配",
            text: "石門打開了！看到滿滿的稀有礦石，你會怎麼做？",
            a: { text: "評估每個人的體力狀況，制定最有效率的搬運計畫。", role: "director" },
            b: { text: "拿起一顆最閃亮的礦石，開始對著攝影機直播介紹它的神奇！", role: "commentator" }
        },
        {
            day: "Day 8：營火晚會",
            text: "探險進入尾聲，大家圍在營火旁休息。這時你會？",
            a: { text: "站起來講述這幾天發生的超瞎趣事，逗得全場哈哈大笑！", role: "commentator" },
            b: { text: "安靜地坐在角落，把這幾天的感動化為一篇充滿詩意的散文。", role: "editor" }
        },
        {
            day: "Day 9：最後衝刺",
            text: "只剩下一天的路程就能回到總部，但大家都累壞了。你會？",
            a: { text: "走在隊伍最前方，穩定步伐並不斷幫大家加油打氣！", role: "director" },
            b: { text: "沿途做最後的環境採樣，確保數據庫的完整性。", role: "investigator" }
        },
        {
            day: "Day 10：任務匯報",
            text: "終於回到總部！長官要求你們呈現這次探險的成果，你會端出什麼？",
            a: { text: "一本畫滿各種未知生物、色彩繽紛的超精美圖鑑集！", role: "illustrator" },
            b: { text: "一篇情節跌宕起伏、讓總部所有人都看到掉眼淚的探險長文！", role: "editor" }
        }
    ];

    const results = {
        'commentator': { title: '🗣️ 金牌解說員', desc: '你是隊伍中的超級麥克風！你不怕生、充滿熱情，能把最無聊的科學知識講得生動有趣。', image: 'commentator.png' },
        'director': { title: '🏕️ 場地總監', desc: '你是隊伍中的定海神針！你總是能看見全局，在混亂中維持秩序，是讓小隊順利存活的關鍵人物！', image: 'director.png' },
        'illustrator': { title: '🎨 圖鑑繪師', desc: '你擁有鷹眼般的觀察力與神之手！別人沒注意到的細節與紋理，都逃不過你的眼睛。', image: 'illustrator.png' },
        'investigator': { title: '🕵️‍♂️ 情報搜查官', desc: '你是冷靜的邏輯大師！你喜歡數據、證據和精準的測量。只要有你在，沒有解不開的謎團！', image: 'investigator.png' },
        'editor': { title: '✍️ 文案編輯員', desc: '你是大自然的故事敘述者！你能把零散的線索轉化成引人入勝的文字，你的筆鋒具有改變世界的感染力！', image: 'editor.png' }
    };

    function startGame() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('question-screen').classList.remove('hidden');
        renderQuestion();
    }

    function renderQuestion() {
        const q = questions[currentQuestionIndex];
        document.getElementById('q-number').innerText = q.day;
        document.getElementById('q-text').innerText = q.text;
        document.getElementById('btn-a').innerText = q.a.text;
        document.getElementById('btn-b').innerText = q.b.text;
        
        // 更新進度條
        const progress = ((currentQuestionIndex + 1) / questions.length) * 100;
        document.getElementById('progress-fill').style.width = progress + '%';
    }

    function answer(choice) {
        // 計分邏輯
        const q = questions[currentQuestionIndex];
        const selectedRole = choice === 'A' ? q.a.role : q.b.role;
        scores[selectedRole]++;

        currentQuestionIndex++;

        if (currentQuestionIndex < questions.length) {
            renderQuestion();
        } else {
            calculateResult();
        }
    }

    function calculateResult() {
        // 找出最高分的屬性
        let maxScore = 0;
        let finalRole = '';
        for (const role in scores) {
            if (scores[role] > maxScore) {
                maxScore = scores[role];
                finalRole = role;
            }
        }

        showResult(finalRole);
    }

    function showResult(resultKey) {
        document.getElementById('question-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        
        const res = results[resultKey];
        document.getElementById('r-title').innerText = res.title;
        document.getElementById('r-desc').innerText = res.desc;

        // 圖片已經準備好，顯示圖片並隱藏預留區
        document.getElementById('result-img-placeholder').style.display = 'none';
        document.getElementById('result-img').src = res.image;
        document.getElementById('result-img').style.display = 'block';
    }
</script>

</body>
</html>
